<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

 

    <div class="container-fluid bg-primary" style="width: 100%;">
    <div class="container py-3" style = "max-width: 100rem;">
        <div class="d-flex align-items-center justify-content-between">
            <a href="index.html" class="navbar-brand text-white fw-bold fs-4 text-decoration-none">
                BudgetBuilds
            </a>
      </div>
    </div>
  </div>

    <div class="container mt-3">

        <h2>Checkout</h2>

        <div class="row">
            <div class="col-md-8">
                <form>

                    <h5>Shipping Info</h5>
                    <div class="mb-2">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">State</label>
                        <select class="form-select">
                            <option selected disabled>Choose...</option>
                            <option>Virginia</option>
                            <option>Maryland</option>
                            <option>North Carolina</option>
                            <option>California</option>
                            <option>New York</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Zip Code</label>
                        <input type="text" class="form-control">
                    </div>

                    <hr>

                    <h5>Shipping Method</h5>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="shipping" id="s1" checked>
                        <label class="form-check-label" for="s1">Standard - $5.99</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="shipping" id="s2">
                        <label class="form-check-label" for="s2">Express - $12.99</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="shipping" id="s3">
                        <label class="form-check-label" for="s3">Local Pickup - Free</label>
                    </div>

                    <hr>

                    <h5>Payment</h5>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" id="p1" checked>
                        <label class="form-check-label" for="p1">Credit / Debit Card</label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="payment" id="p2">
                        <label class="form-check-label" for="p2">PayPal</label>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Name on Card</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Card Number</label>
                        <div class="input-group">
                            <span class="input-group-text">#</span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Expiration</label>
                        <input type="text" class="form-control" placeholder="MM/YY">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">CVV</label>
                        <input type="text" class="form-control">
                    </div>

                    <hr>

                    <a href="index.html" class="btn btn-primary" onclick="clearCart()">Confirm Purchase</a>
                    <a href="index.html" class="btn btn-secondary">Back</a>

                </form>
            </div>

            <div class="col-md-4" id="cart-items">
                <h5>Order Summary</h5>
                <hr>
                
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            const container = document.getElementById("cart-items");
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                container.innerHTML += `
                <div class="mb-5">
                    <h5>${item.title}</h5>
                    <p>Qty: ${item.quantity}</p>
                    <p>Subtotal: $${(item.price * item.quantity).toFixed(2)}</p>
                </div>
                <hr>
                `;
            });
            total += total * 0.05; // Shipping
            total += total * 0.08; // Tax
            container.innerHTML += `
                <p>Shipping: $${(total * 0.05).toFixed(2)}</p>
                <p>Tax: $${(total * 0.08).toFixed(2)}</p>
                <hr>
                <p><strong>Total: $${total.toFixed(2)}</strong></p>
            `;
        }
        loadCart();   

        function clearCart() {
            localStorage.removeItem("cart");
        }
    </script>
</body>
</html>
