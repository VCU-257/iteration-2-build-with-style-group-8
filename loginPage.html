<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetBuilds – Sign In</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    .icon-btn {
      background: transparent;
      border: 2px solid transparent;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      transition: border-color 0.2s ease;
      font-size: 2rem;
    }
    .icon-btn:hover {
      border-color: white;
      color: white;
    }

    .signin-wrapper {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8f9fa;
      padding: 48px 16px;
    }

    .signin-card {
      width: 100%;
      max-width: 440px;
    }

    /* Loading state on submit button */
    .btn-spinner {
      display: none;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading .btn-text   { display: none; }
    .loading .btn-spinner { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Navbar — identical to home page -->
  <div class="container-fluid bg-primary" style="width: 100%;">
    <div class="container py-3" style="max-width: 100rem;">
      <div class="d-flex align-items-center justify-content-between">

        <a href="index.html" class="navbar-brand text-white fw-bold fs-4 text-decoration-none">
          BudgetBuilds
        </a>

        <a href="search.html" class="text-decoration-none d-block w-50">
          <input type="text" class="form-control mx-3 rounded" placeholder="Search">
        </a>

        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-light rounded">Seller</button>
          <a href="CheckOut.html">
            <button class="btn icon-btn d-flex align-items-center gap-1" style="font-size: 1.7rem;">
              <i class="bi bi-cart"></i>
            </button>
          </a>
          <!-- Person icon stays as a button (already on this page) -->
          <button class="btn icon-btn d-flex align-items-center gap-1">
            <i class="bi bi-person-fill"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sign-in form -->
  <div class="signin-wrapper">
    <div class="signin-card">
      <div class="card shadow-sm rounded">
        <div class="card-body p-4 p-sm-5">

          <h2 class="fw-bold mb-1 text-center">Welcome back</h2>
          <p class="text-muted text-center mb-4">Sign in to your account to continue</p>

          <form id="loginForm" novalidate>

            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="you@example.com" autocomplete="email">
                <div class="invalid-feedback" id="emailError">
                  Please enter a valid email address.
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter your password" autocomplete="current-password">
                <button class="btn btn-outline-secondary" type="button" id="togglePw"
                        aria-label="Toggle password visibility">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
                <div class="invalid-feedback" id="passwordError">
                  Password must be at least 6 characters.
                </div>
              </div>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
              </div>
              <a href="#" class="text-primary text-decoration-none" style="font-size: 0.875rem;">
                Forgot password?
              </a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
              <span class="btn-text">Sign In</span>
              <span class="btn-spinner" role="status" aria-hidden="true"></span>
            </button>

          </form>

          <hr class="my-4">

          <p class="text-center text-muted mb-0">
            Don't have an account? <a href="#" class="text-primary fw-semibold text-decoration-none">Sign up</a>
          </p>

        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Toast -->
  <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index: 999;">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form        = document.getElementById('loginForm');
    const emailInput  = document.getElementById('email');
    const passInput   = document.getElementById('password');
    const emailError  = document.getElementById('emailError');
    const passError   = document.getElementById('passwordError');
    const loginBtn    = document.getElementById('loginBtn');
    const togglePw    = document.getElementById('togglePw');
    const eyeIcon     = document.getElementById('eyeIcon');
    const toastEl     = document.getElementById('liveToast');
    const toastMsg    = document.getElementById('toastMsg');
    const bsToast     = new bootstrap.Toast(toastEl, { delay: 3500 });

    togglePw.addEventListener('click', () => {
      const show = passInput.type === 'password';
      passInput.type = show ? 'text' : 'password';
      eyeIcon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    const validEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    const validPass  = v => v.length >= 6;

    function markInvalid(input, msg, errorEl) {
      input.classList.add('is-invalid');
      input.classList.remove('is-valid');
      errorEl.textContent = msg;
    }

    function markValid(input) {
      input.classList.remove('is-invalid');
      input.classList.add('is-valid');
    }

    emailInput.addEventListener('input', () => {
      if (validEmail(emailInput.value)) markValid(emailInput);
    });

    passInput.addEventListener('input', () => {
      if (validPass(passInput.value)) markValid(passInput);
    });

    function showToast(message, success = false) {
      toastMsg.textContent = message;
      toastEl.classList.toggle('bg-success', success);
      toastEl.classList.toggle('bg-danger',  !success);
      bsToast.show();
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      let valid = true;

      if (!validEmail(emailInput.value)) {
        markInvalid(emailInput, 'Please enter a valid email address.', emailError);
        valid = false;
      } else {
        markValid(emailInput);
      }

      if (!validPass(passInput.value)) {
        markInvalid(passInput, 'Password must be at least 6 characters.', passError);
        valid = false;
      } else {
        markValid(passInput);
      }

      if (!valid) return;

      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      await new Promise(r => setTimeout(r, 1800));

      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;

      showToast('Logged in successfully! Redirecting…', true);
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    });
  </script>
</body>
</html>
